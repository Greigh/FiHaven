<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="robots" content="noindex" />
  <title>Continue with Google — FiHaven</title>
  <style>
    :root { color-scheme: light; }
    body {
      margin: 0; min-height: 100vh; display: flex; flex-direction: column;
      align-items: center; justify-content: center; gap: 18px;
      font-family: "Manrope", system-ui, sans-serif;
      background: linear-gradient(160deg, #f7f3eb 0%, #ebe4d6 100%);
      color: #1c1917; padding: 24px; box-sizing: border-box;
    }
    h1 { font-size: 1.25rem; font-weight: 700; margin: 0; }
    #status { color: #57534e; font-size: 0.95rem; text-align: center; max-width: 22rem; }
    #btn { min-height: 44px; }
    a.btn {
      display: none; align-items: center; justify-content: center;
      min-height: 44px; padding: 0 18px; border-radius: 10px;
      background: #1c1917; color: #fafaf9; text-decoration: none; font-weight: 600;
    }
  </style>
</head>
<body>
  <h1>FiHaven</h1>
  <p id="status">Connecting to Google…</p>
  <div id="btn"></div>
  <a class="btn" id="open" href="#">Open FiHaven</a>
  <script src="https://accounts.google.com/gsi/client" async defer></script>
  <script>
    (function () {
      var params = new URLSearchParams(location.search);
      var state = params.get('state') || '';
      var statusEl = document.getElementById('status');
      var openEl = document.getElementById('open');
      var started = false;

      function fail(msg) { statusEl.textContent = msg; }

      /**
       * Top-level form POST → server 302 to fihaven:// (same as Apple).
       * Custom Tabs honor HTTP redirects out of the tab; they often block
       * async JS location.replace(intent://…) after fetch.
       */
      function finish(idToken) {
        statusEl.textContent = 'Finishing sign-in…';
        var form = document.createElement('form');
        form.method = 'POST';
        form.action = '/api/auth/oauth/google/callback';
        form.style.display = 'none';
        function field(name, value) {
          var input = document.createElement('input');
          input.type = 'hidden';
          input.name = name;
          input.value = value;
          form.appendChild(input);
        }
        field('id_token', idToken);
        if (state) field('state', state);
        document.body.appendChild(form);
        form.submit();
      }

      function ready(clientId) {
        if (started || !window.google || !google.accounts || !google.accounts.id) return;
        started = true;
        google.accounts.id.initialize({
          client_id: clientId,
          callback: function (resp) {
            if (resp && resp.credential) finish(resp.credential);
            else fail('Google did not return a sign-in token. Try again.');
          },
          auto_select: false,
          cancel_on_tap_outside: false,
          // One Tap prompt() often dismisses without a credential inside
          // Custom Tabs — use the explicit button only.
          use_fedcm_for_prompt: false,
        });
        google.accounts.id.renderButton(document.getElementById('btn'), {
          theme: 'outline',
          size: 'large',
          width: 320,
          text: 'continue_with',
          shape: 'rectangular',
          logo_alignment: 'left',
        });
        statusEl.textContent = 'Tap Continue with Google, then choose an account.';
      }

      fetch('/api/auth/oauth/config', { credentials: 'same-origin' })
        .then(function (r) { return r.json(); })
        .then(function (cfg) {
          if (!cfg.google || !cfg.google.enabled || !cfg.google.clientId) {
            fail('Google sign-in is not configured on the server.');
            return;
          }
          var clientId = cfg.google.clientId;
          if (window.google && google.accounts && google.accounts.id) ready(clientId);
          else {
            var n = 0;
            var t = setInterval(function () {
              n += 1;
              if (window.google && google.accounts && google.accounts.id) {
                clearInterval(t);
                ready(clientId);
              } else if (n > 100) {
                clearInterval(t);
                fail('Could not load Google sign-in. Check your connection and try again.');
              }
            }, 50);
          }
        })
        .catch(function () { fail('Could not reach FiHaven. Try again.'); });

      // Manual backup if the 302 bounce fails (rare).
      openEl.style.display = 'none';
      openEl.addEventListener('click', function (e) {
        if (!openEl.getAttribute('href') || openEl.getAttribute('href') === '#') {
          e.preventDefault();
        }
      });
    })();
  </script>
</body>
</html>
