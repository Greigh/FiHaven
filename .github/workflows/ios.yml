name: iOS CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  core:
    runs-on: macos-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up Swift
        uses: swift-actions/setup-swift@v2
        with:
          swift-version: "6.0"

      - name: Run FiHavenCore checks
        working-directory: ios/FiHavenCore
        run: swift run FiHavenCoreChecks
        env:
          # The checks executable is gated behind this flag in Package.swift,
          # so CI must set it or `swift run FiHavenCoreChecks` finds no product.
          FH_INCLUDE_CHECKS: "1"
          # Optional live-server checks stay skipped unless FH_LIVE_TOKEN is set.
          # To enable, add a repo secret and uncomment:
          #   FH_LIVE_TOKEN: ${{ secrets.FH_LIVE_TOKEN }}
          #   FH_BASE: ${{ vars.FH_BASE }}

  app:
    runs-on: macos-latest
    needs: core

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode project
        working-directory: ios/FiHavenApp
        run: xcodegen generate

      - name: Build iOS app
        working-directory: ios/FiHavenApp
        run: xcodebuild -project FiHaven.xcodeproj -scheme FiHaven -destination 'generic/platform=iOS Simulator' build
