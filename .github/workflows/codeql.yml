name: CodeQL

on:
  push:
    branches: [main]
  pull_request:
  schedule:
    - cron: "17 3 * * 1"
  workflow_dispatch:

jobs:
  javascript-typescript:
    name: Analyze JavaScript / TypeScript
    runs-on: ubuntu-latest

    permissions:
      actions: read
      contents: read
      security-events: write

    strategy:
      fail-fast: false
      matrix:
        language: [javascript-typescript]

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: ${{ matrix.language }}

      - name: Perform CodeQL analysis
        uses: github/codeql-action/analyze@v3

  java-kotlin:
    name: Analyze Java / Kotlin
    runs-on: ubuntu-latest

    permissions:
      actions: read
      contents: read
      security-events: write

    strategy:
      fail-fast: false
      matrix:
        language: [java-kotlin]

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 17

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: ${{ matrix.language }}
          # Trace a real Gradle build: build-mode:none sees no Kotlin source for
          # this Android project, and autobuild can't drive it — so build manually.
          build-mode: manual

      - name: Build Android app (traced for CodeQL)
        working-directory: android
        # Requires Kotlin < 2.3.30 in android/build.gradle.kts until CodeQL supports 2.4+
        # (github.com/github/codeql/issues/21938).
        run: ./gradlew :app:assembleDebug

      - name: Perform CodeQL analysis
        uses: github/codeql-action/analyze@v3

  swift:
    name: Analyze Swift
    runs-on: macos-latest

    permissions:
      actions: read
      contents: read
      security-events: write

    strategy:
      fail-fast: false
      matrix:
        language: [swift]

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: ${{ matrix.language }}

      - name: Generate Xcode project
        working-directory: ios/FiHavenApp
        run: xcodegen generate

      - name: Build iOS app
        working-directory: ios/FiHavenApp
        run: xcodebuild -project FiHaven.xcodeproj -scheme FiHaven -destination 'generic/platform=iOS Simulator' build

      - name: Perform CodeQL analysis
        uses: github/codeql-action/analyze@v3
