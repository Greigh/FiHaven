name: Labeler

on:
  pull_request_target:
    types: [opened, synchronize, reopened, ready_for_review]

jobs:
  label:
    permissions:
      contents: read
      pull-requests: write
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Apply labels
        uses: actions/labeler@v6
