# XcodeGen spec for the FiHaven iOS/macOS app.
#   brew install xcodegen   # one-time
#   cd ios/FiHavenApp && xcodegen generate
#   open FiHaven.xcodeproj
#
# Runs on iPhone + iPad, and on Apple Silicon Macs via the
# "My Mac (Designed for iPad)" run destination — covering the
# iOS/macOS ask from a single target. Links the local, already-
# verified FiHavenCore package.
name: FiHaven
options:
  bundleIdPrefix: app.fihaven
  deploymentTarget:
    iOS: "18.6"
  createIntermediateGroups: true
  # Keeps LastUpgradeCheck in sync with Xcode 26 so "Update to recommended
  # settings" doesn't reappear after every xcodegen generate.
  xcodeVersion: "26.0"

# Xcode 26 recommended settings — also set in project/target build settings below.
attributes:
  LastUpgradeCheck: 2600
  LastSwiftUpdateCheck: 2600

# Project-level build settings (team + asset catalog symbols inherit to targets).
settings:
  base:
    DEVELOPMENT_TEAM: 365KR8NF53
    ASSETCATALOG_COMPILER_GENERATE_SWIFT_ASSET_SYMBOL_EXTENSIONS: YES
    LOCALIZATION_PREFERS_STRING_CATALOGS: YES

packages:
  FiHavenCore:
    path: ../FiHavenCore
  # Plaid Link iOS SDK for in-app bank connections (Pro). Drives the
  # existing /api/plaid link-token + exchange endpoints.
  LinkKit:
    url: https://github.com/plaid/plaid-link-ios-spm
    exactVersion: 6.4.7
  # Google Sign-In: returns an OIDC ID token we post to
  # /api/auth/oauth/google. Needs GIDClientID + the reversed-client-id URL
  # scheme in Info.plist (both set below).
  GoogleSignIn:
    url: https://github.com/google/GoogleSignIn-iOS
    from: 7.1.0

targets:
  FiHaven:
    type: application
    platform: iOS
    sources:
      - path: Sources
    # Local StoreKit testing: the generated scheme points at this config
    # so subscriptions resolve in the simulator without App Store Connect.
    scheme:
      storeKitConfiguration: FiHaven.storekit
      # Scheme version stamp — matches attributes.LastUpgradeCheck above.
      lastUpgradeVersion: "2600"
      # TestFlight / App Store archives must use Release (no DEBUG compile flag).
      # Run and Test stay on Debug for local development.
      archive:
        config: Release
      profile:
        config: Release
      run:
        config: Debug
      test:
        config: Debug
      # Baked into the generated scheme so `xcodegen generate` can't wipe
      # them. The app talks to PRODUCTION by default. To run against the
      # local dev server, flip FH_BASE here (or in Xcode's scheme) to
      # http://localhost:5222 and start `node server/index.js`.
      environmentVariables:
        - variable: FH_BASE
          value: https://fihaven.app
          isEnabled: true
    # Sign in with Apple needs this entitlement. xcodegen writes the
    # entitlements file and sets CODE_SIGN_ENTITLEMENTS. You must ALSO enable
    # the "Sign in with Apple" capability on the App ID (app.fihaven) in the
    # Apple Developer portal, or signed builds will fail provisioning.
    entitlements:
      path: Sources/FiHaven.entitlements
      properties:
        com.apple.developer.applesignin:
          - Default
        # Passkeys (passwordless sign-in). Must match the rpID 'fihaven.app'
        # and the server's /.well-known/apple-app-site-association webcredentials
        # entry (365KR8NF53.app.fihaven). Also enable the Associated Domains
        # capability on the App ID in the Apple Developer portal.
        com.apple.developer.associated-domains:
          - webcredentials:fihaven.app
    dependencies:
      - package: FiHavenCore
      - package: LinkKit
      - package: GoogleSignIn
        product: GoogleSignIn
    postbuildScripts:
      - name: Generate LinkKit dSYM
        path: Scripts/generate-linkkit-dsym.sh
        # Declare the framework binary in / dSYM out so Xcode runs this only
        # when the embedded LinkKit changes (silences the "runs every build"
        # warning) and orders it after Embed Frameworks.
        inputFiles:
          - $(TARGET_BUILD_DIR)/$(FRAMEWORKS_FOLDER_PATH)/LinkKit.framework/LinkKit
        outputFiles:
          - $(DWARF_DSYM_FOLDER_PATH)/LinkKit.framework.dSYM
    info:
      path: Sources/Info.plist
      properties:
        CFBundleDisplayName: FiHaven
        LSApplicationCategoryType: public.app-category.finance
        CFBundleShortVersionString: "1.5.0"
        CFBundleVersion: "$(CURRENT_PROJECT_VERSION)"
        UILaunchScreen:
          UIColorName: LaunchBg
          UIImageName: LaunchIcon
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        UISupportedInterfaceOrientations~ipad:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        ITSAppUsesNonExemptEncryption: false
        # Required to use Face ID for the optional app lock.
        NSFaceIDUsageDescription: Unlock FiHaven with Face ID.
        # Bundled fonts (OFL): Manrope (variable, UI) + IBM Plex Mono
        # (numbers). Files live in Sources/Resources/Fonts and are copied
        # into the bundle root, so list bare filenames.
        UIAppFonts:
          - Manrope-Variable.ttf
          - IBMPlexMono-Regular.ttf
          - IBMPlexMono-Medium.ttf
        # Cloudflare Turnstile public sitekey, driven by the build setting
        # below so release can override it. Read via AppConfig.
        TurnstileSiteKey: $(TURNSTILE_SITEKEY)
        # Google Sign-In: the iOS OAuth client id, and its reversed form as a
        # URL scheme so the sign-in callback returns to the app. Public values.
        GIDClientID: 742737810532-g6uuhmquasqvqo0c0ugq7nlp3niomevb.apps.googleusercontent.com
        CFBundleURLTypes:
          - CFBundleURLSchemes:
              - com.googleusercontent.apps.742737810532-g6uuhmquasqvqo0c0ugq7nlp3niomevb
        # Production is HTTPS-only. NSAllowsLocalNetworking permits the
        # http://localhost:5222 dev server without weakening global ATS.
        NSAppTransportSecurity:
          NSAllowsLocalNetworking: true
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: app.fihaven
        # App icon — "Fi" monogram in Sources/Assets.xcassets.
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        MARKETING_VERSION: "1.5.0"
        CURRENT_PROJECT_VERSION: "8"
        INFOPLIST_KEY_CFBundleDisplayName: FiHaven
        INFOPLIST_KEY_LSApplicationCategoryType: public.app-category.finance
        # Swift 5 language mode keeps the first builds free of strict-
        # concurrency churn; can be bumped to 6 later.
        SWIFT_VERSION: "5.0"
        TARGETED_DEVICE_FAMILY: "1,2"
        # The "Generate LinkKit dSYM" post-build script must read the embedded
        # Plaid LinkKit.framework and run dsymutil on it. Under the user-script
        # sandbox that read is denied ("Operation not permitted"), which fails
        # both local archives and CI (GitHub Actions + Xcode Cloud). Disabling
        # the script sandbox lets the one build script do its job; it has no
        # effect on the shipped app. (Previously worked around per-build with
        # ENABLE_USER_SCRIPT_SANDBOXING=NO on the xcodebuild command line.)
        ENABLE_USER_SCRIPT_SANDBOXING: NO
        GENERATE_INFOPLIST_FILE: NO
        CODE_SIGN_STYLE: Automatic
        STRING_CATALOG_GENERATE_SYMBOLS: YES
        IPHONEOS_DEPLOYMENT_TARGET: "18.6"
        # Cloudflare Turnstile public sitekey (real production key — public,
        # so safe to commit). Verifies against the production secret; the
        # local dev server's .env holds the matching secret too, so it also
        # works against localhost. For automated/simulator testing without a
        # real challenge, override FH_TURNSTILE_SITEKEY=1x00000000000000000000AA
        # (the always-pass test key) in the scheme.
        TURNSTILE_SITEKEY: 0x4AAAAAADVKKZMye086WePX
      configs:
        Debug:
          SWIFT_ACTIVE_COMPILATION_CONDITIONS: DEBUG
        Release:
          # TestFlight / App Store: no DEBUG flag — strips #if DEBUG dev UI
          # (Settings → Developer, FH_AUTOLOGIN, StoreKit skip, etc.).
          DEBUG_INFORMATION_FORMAT: dwarf-with-dsym
          ENABLE_DEBUG_DYLIB: NO
